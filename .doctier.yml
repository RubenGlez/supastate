version: 1

# .harness/ is the private doc store: encrypted in git, decrypted on checkout.
# Prototype/spike code is sensitive scratch: never committed, dies with the worktree.
docs:
  - path: ".harness/**"
    visibility: private
    lifetime: durable

  - path: "**/_prototype-*"
    visibility: private
    lifetime: ephemeral
    sensitive: true

  - path: "**/_spike/**"
    visibility: private
    lifetime: ephemeral
    sensitive: true

recipients_file: .doctier/recipients.txt
