<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo — supastate</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    #summary { color: #666; margin-bottom: 1.5rem; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    input { flex: 1; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #111; color: #fff; }
    button:disabled { background: #ccc; cursor: default; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
    li button { background: none; color: #999; font-size: 0.875rem; padding: 0.25rem 0.5rem; }
    li button:hover { color: #e00; }
  </style>
</head>
<body>
  <h1>Todos</h1>
  <p id="summary"></p>

  <form id="form">
    <input id="input" type="text" placeholder="What needs to be done?" autocomplete="off">
    <button id="add-btn" type="submit">Add</button>
  </form>

  <ul id="list"></ul>

  <script type="module">
    import { reactive, text, attr, effect } from '../dist/index.mjs'

    const state = reactive({ items: [], input: '' })

    const input = document.getElementById('input')
    const list = document.getElementById('list')

    // keep input value in sync with state
    input.addEventListener('input', e => { state.input = e.target.value })

    // disable Add button when input is empty
    attr('#add-btn', 'disabled', () => state.input.trim() === '')

    // live summary
    text('#summary', () =>
      state.items.length === 0
        ? 'No items yet.'
        : `${state.items.length} item${state.items.length === 1 ? '' : 's'}`
    )

    // re-render list whenever items change
    effect(() => {
      list.innerHTML = ''
      state.items.forEach((item, i) => {
        const li = document.createElement('li')
        li.textContent = item

        const btn = document.createElement('button')
        btn.textContent = 'Remove'
        btn.onclick = () => { state.items.splice(i, 1) }

        li.appendChild(btn)
        list.appendChild(li)
      })
    })

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault()
      const value = state.input.trim()
      if (!value) return
      state.items.push(value)
      state.input = ''
      input.value = ''
    })
  </script>
</body>
</html>
