<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theme Toggle — supastate</title>
  <style>
    body { font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; transition: background 0.2s, color 0.2s; }
    body.dark { background: #111; color: #f5f5f5; }
    body.light { background: #f5f5f5; color: #111; }
    h1 { font-size: 2rem; margin: 0; }
    button { padding: 0.75rem 2rem; font-size: 1rem; cursor: pointer; border: 2px solid currentColor; background: transparent; color: inherit; border-radius: 999px; }
    p { color: inherit; opacity: 0.6; margin: 0; }
  </style>
</head>
<body>
  <h1 id="heading"></h1>
  <p id="description"></p>
  <button id="toggle"></button>

  <script type="module">
    import { reactive, text, className } from '../dist/index.mjs'

    const state = reactive({ dark: false })

    className(document.body, () => state.dark ? 'dark' : 'light')

    text('#heading', () => state.dark ? 'Dark mode' : 'Light mode')
    text('#description', () => state.dark ? 'Easy on the eyes at night.' : 'Clean and bright.')
    text('#toggle', () => state.dark ? 'Switch to light' : 'Switch to dark')

    document.getElementById('toggle').onclick = () => { state.dark = !state.dark }
  </script>
</body>
</html>
